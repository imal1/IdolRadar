spring:
  datasource:
    # PostgreSQL/Redis 容器只映射到宿主机回环地址，Java 进程不进入 Docker 网络。
    url: jdbc:postgresql://127.0.0.1:${POSTGRES_PORT:5432}/${POSTGRES_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    hikari:
      maximum-pool-size: ${DATABASE_POOL_SIZE:10}
      minimum-idle: 2
      connection-timeout: 5000
      validation-timeout: 3000
  data:
    redis:
      host: 127.0.0.1
      port: ${REDIS_PORT:16379}
      username: ${REDIS_USERNAME:}
      password: ${REDIS_PASSWORD}
      ssl:
        enabled: false
      connect-timeout: 2s
      timeout: 2s
  flyway:
    # startup.sh 仅在 migration 阶段临时覆盖为 true，API 进程禁止执行 DDL。
    enabled: ${SPRING_FLYWAY_ENABLED:false}

server:
  address: 127.0.0.1
  port: ${APP_PORT:8080}
  forward-headers-strategy: framework

idolradar:
  wechat:
    app-id: ${WECHAT_APP_ID}
    app-secret: ${WECHAT_APP_SECRET}
    api-base-url: ${WECHAT_API_BASE_URL:https://api.weixin.qq.com}
    timeout: 10s
  subscribe-template-id: ${SUBSCRIBE_TEMPLATE_ID:}
  session-ttl: ${SESSION_TTL:30d}
  rate-limit:
    ip-limit: ${RATE_LIMIT_IP:1200}
    default-limit: ${RATE_LIMIT_USER:120}
    login-limit: ${RATE_LIMIT_LOGIN:20}
    subscription-limit: ${RATE_LIMIT_SUBSCRIPTION:12}
    window: 1m
  worker:
    # Worker 尚未调度；保留完整参数，后续可用同一 Jar 执行 APP_MODE=worker。
    wechat-app-id: ${WECHAT_APP_ID}
    wechat-app-secret: ${WECHAT_APP_SECRET}
    wechat-api-base-url: ${WECHAT_API_BASE_URL:https://api.weixin.qq.com}
    subscribe-template-id: ${SUBSCRIBE_TEMPLATE_ID:}
    miniprogram-state: ${MINIPROGRAM_STATE:trial}
    rss-timeout: ${RSS_TIMEOUT:10s}
    rss-max-response-bytes: ${RSS_MAX_RESPONSE_BYTES:2097152}
    rss-max-redirects: ${RSS_MAX_REDIRECTS:3}
    rss-max-entries-per-source: ${RSS_MAX_ENTRIES_PER_SOURCE:100}
    rss-source-concurrency: ${RSS_SOURCE_CONCURRENCY:4}
    notification-concurrency: ${NOTIFY_CONCURRENCY:8}
    notification-lease: ${NOTIFICATION_LEASE:15m}
    notification-max-attempts: ${NOTIFICATION_MAX_ATTEMPTS:5}
    notification-retry-base: ${NOTIFICATION_RETRY_BASE:1m}

logging:
  level:
    root: ${LOG_LEVEL:INFO}
