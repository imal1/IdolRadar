name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Java unit tests
        run: mvn -B -f backend/pom.xml test

      - name: PostgreSQL migration and seed integration tests
        run: mvn -B -f backend/pom.xml -Pintegration-test -Didolradar.it.enabled=true verify

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Prepare mini program config
        run: cp miniprogram/config/env.example.js miniprogram/config/env.js

      - name: Mini program contract and release checks
        run: |
          npm ci --ignore-scripts
          npm test
          npm run validate
          docker compose config --quiet

      - name: Production image build
        run: docker build --tag idolradar-ci .
