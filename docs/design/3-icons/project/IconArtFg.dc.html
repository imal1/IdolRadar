<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<div style="position:absolute;inset:0;container-type:size;overflow:hidden">
  <div style="position:absolute;left:50%;top:50%;width:48%;height:48%;transform:translate(-50%,-50%);border:1.5px solid rgba(231,138,164,.14);border-radius:50%"></div>
  <div style="position:absolute;left:50%;top:50%;width:82%;height:82%;transform:translate(-50%,-50%);border:1.5px solid rgba(231,138,164,.09);border-radius:50%"></div>
  <div style="position:absolute;left:50%;top:50%;width:50%;height:1.4cqmin;transform-origin:left center;transform:translateY(-50%) rotate(-34deg);background:linear-gradient(90deg,rgba(231,138,164,0),#e78aa4);border-radius:2px;animation:spin 5s linear infinite"></div>
  <div style="position:absolute;left:50%;top:50%;width:3.2cqmin;height:3.2cqmin;transform:translate(-50%,-50%);border-radius:50%;background:#e78aa4"></div>
  <div style="position:absolute;left:68%;top:32%;width:21cqmin;height:21cqmin;transform:translate(-50%,-50%)">
    <div style="position:absolute;inset:0;border-radius:50%;background:rgba(231,138,164,.3);animation:pulse 2.6s ease-out infinite"></div>
    <span style="position:absolute;left:50%;top:50%;transform:translate(-50%,-54%);font-size:12.7cqmin;line-height:1;background:linear-gradient(150deg,#ffd3df,#e78aa4 55%,#c4526e);-webkit-background-clip:text;background-clip:text;color:transparent;filter:drop-shadow(0 2px 6px rgba(231,138,164,.7))">♥</span>
  </div>
</div>
</x-dc>
</body>
</html>
